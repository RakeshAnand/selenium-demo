<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Selenium Demo Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #resultsChart {
            max-width: 300px;
            max-height: 300px;
            margin: auto;
        }

        .run-tests-form {
            margin-top: 30px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Selenium Framework</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/view-report" target="_blank">Latest Extent
                            Report</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row text-center">
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Total Tests</h5>
                        <p class="display-6 text-primary" th:text="${stats.total}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Passed</h5>
                        <p class="display-6 text-success" th:text="${stats.passed}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Failed</h5>
                        <p class="display-6 text-danger" th:text="${stats.failed}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Last Execution</h5>
                        <p class="h5 mt-3 text-secondary" th:text="${stats.lastRunTime}">Never</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Pass/Fail Distribution</h5>
                        <canvas id="resultsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="run-tests-form shadow-sm">
            <h5 class="mb-3">Execute Test Suite</h5>
            <form action="/run-tests" method="get">
                <div class="input-group">
                    <label class="input-group-text" for="featureFile">Feature</label>
                    <select class="form-select" id="featureFile">
                        <option selected>All Features</option>
                        <option value="login.feature">Login Functionality</option>
                        <option value="search.feature">Search Functionality</option>
                    </select>
                    <button class="btn btn-primary" type="submit">Run Tests</button>
                </div>
            </form>
            <small class="text-muted mt-2 d-block">Note: Clicking run will execute tests in headless mode via the
                controller.</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script th:inline="javascript">
        /* Accessing the 'stats' object passed from Controller */
        const passed = [[${ stats.passed }]];
        const failed = [[${ stats.failed }]];
        const skipped = [[${ stats.skipped }]];

        const ctx = document.getElementById('resultsChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Passed', 'Failed', 'Skipped'],
                datasets: [{
                    data: [passed, failed, skipped],
                    backgroundColor: ['#198754', '#dc3545', '#ffc107'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    </script>
</body>

</html>
