<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Selenium Demo Dashboard</title>
    <link href="/css/style.css" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Keep chart compact and centered */
        #resultsChart {
            max-width: 300px;
            max-height: 300px;
            margin: auto;
        }
    </style>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Selenium Demo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/run-tests">Run Tests</a></li>
                    <li class="nav-item"><a class="nav-link" href="/view-report">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row">
            <!-- Cards -->
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Total Tests</h5>
                        <p class="display-6 text-primary" th:text="${totalTests}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Passed</h5>
                        <p class="display-6 text-success" th:text="${passedTests}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Failed</h5>
                        <p class="display-6 text-danger" th:text="${failedTests}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Last Run</h5>
                        <p class="display-6 text-secondary" th:text="${lastRunTime}">0s</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Execution Summary</h5>
                        <canvas id="resultsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="row mt-4">
            <div class="col-md-6 text-center">
                <a href="/run-tests" class="btn btn-primary btn-lg">Run Tests</a>
            </div>
            <div class="col-md-6 text-center">
                <a href="/view-report" class="btn btn-success btn-lg">View Latest Report</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js Initialization -->
    <script th:inline="javascript">
        const passed = [[${ passedTests }]];
        const failed = [[${ failedTests }]];
        const skipped = [[${ skippedTests }]];

        const ctx = document.getElementById('resultsChart').getContext('2d');
        const resultsChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Passed', 'Failed', 'Skipped'],
                datasets: [{
                    data: [passed, failed, skipped],
                    backgroundColor: ['#198754', '#dc3545', '#ffc107']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    </script>

    <!-- ✅ Add your form here -->
    <div class="run-tests-form">
        <form action="/run" method="post">
            <label for="featureFile">Select Feature File:</label>
            <select name="featureFile" id="featureFile">
                <option value="src/test/resources/features/login.feature">Login</option>
                <option value="src/test/resources/features/search.feature">Search</option>
                <option value="src/test/resources/features/cart.feature">Cart</option>
            </select>
            <button type="submit">Run Selected Feature</button>
        </form>
    </div>
</body>


</html>
