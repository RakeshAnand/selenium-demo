<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Selenium Demo Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #resultsChart {
            max-width: 300px;
            max-height: 300px;
            margin: auto;
        }

        /* Fixed height for the trend chart */
        #trendChart {
            min-height: 250px;
            max-height: 400px;
        }

        .run-tests-form {
            margin-top: 30px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Selenium Framework</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/view-report" target="_blank">Latest Extent
                            Report</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row text-center">
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Total Tests</h5>
                        <p class="display-6 text-primary" th:text="${stats.total}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Passed</h5>
                        <p class="display-6 text-success" th:text="${stats.passed}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Failed</h5>
                        <p class="display-6 text-danger" th:text="${stats.failed}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-muted">Last Execution</h5>
                        <p class="h5 mt-3 text-secondary" th:text="${stats.lastRunTime}">Never</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-center">Execution Trend (Past Runs)</h5>
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Pass/Fail Distribution</h5>
                        <canvas id="resultsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="run-tests-form shadow-sm">
            <h5 class="mb-3">Execute Test Suite</h5>
            <form action="/run-tests" method="get">
                <div class="input-group">
                    <label class="input-group-text" for="featureFile">Feature</label>
                    <select class="form-select" id="featureFile">
                        <option selected>All Features</option>
                        <option value="login.feature">Login Functionality</option>
                        <option value="search.feature">Search Functionality</option>
                    </select>
                    <button class="btn btn-primary" type="submit">Run Tests</button>
                </div>
            </form>
            <small class="text-muted mt-2 d-block">Note: Clicking run will execute tests in headless mode via the
                controller.</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script th:inline="javascript">
        /* 1. DATA FROM CONTROLLER */
        const stats = [[${ stats }]];
        const historyData = [[${ history }]];

        console.log("Latest Stats:", stats);
        console.log("Historical Data:", historyData);

        /* 2. DOUGHNUT CHART (LATEST RUN) */
        const ctxDoughnut = document.getElementById('resultsChart').getContext('2d');
        new Chart(ctxDoughnut, {
            type: 'doughnut',
            data: {
                labels: ['Passed', 'Failed', 'Skipped'],
                datasets: [{
                    data: [stats.passed, stats.failed, stats.skipped],
                    backgroundColor: ['#198754', '#dc3545', '#ffc107'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });

        /* 3. LINE CHART (TREND) */
        if (historyData && historyData.length > 0) {
            const labels = historyData.map(run => run.lastRunTime);
            const passedTrend = historyData.map(run => run.passed);
            const failedTrend = historyData.map(run => run.failed);

            const ctxLine = document.getElementById('trendChart').getContext('2d');
            new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Passed',
                            data: passedTrend,
                            borderColor: '#198754',
                            backgroundColor: 'rgba(25, 135, 84, 0.1)',
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Failed',
                            data: failedTrend,
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            fill: true,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    },
                    plugins: { legend: { position: 'top' } }
                }
            });
        }
    </script>
</body>

</html>
