name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Java (adjust version if needed)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build project
      - name: Build with Maven
        run: mvn -B clean compile

      # Run sanity tests (Cucumber JSON + HTML)
      - name: Run Sanity Tests
        run: mvn test -Dcucumber.options="--plugin json:core/target/cucumber.json --plugin html:core/target/cucumber-reports.html"

      # Run Cucumber verify (pretty + HTML)
      - name: Run Cucumber Verify
        run: mvn verify -Dcucumber.options="--plugin pretty --plugin html:core/target/cucumber-reports.html"

      # Upload Surefire reports
      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v3
        with:
          name: surefire-reports
          path: core/target/surefire-reports/

      # Upload Cucumber reports
      - name: Upload Cucumber Reports
        uses: actions/upload-artifact@v3
        with:
          name: cucumber-reports
          path: core/target/cucumber-reports.html

      # Upload Extent reports
      - name: Upload Extent Reports
        uses: actions/upload-artifact@v3
        with:
          name: extent-reports
          path: reports/extent.html

      # Upload all artifacts (HTML, XML, JSON)
      - name: Upload All Reports
        uses: actions/upload-artifact@v3
        with:
          name: all-reports
          path: |
            **/target/**/*.html
            **/target/**/*.xml
            **/target/**/*.json
            reports/*.html
            reports/*.json
